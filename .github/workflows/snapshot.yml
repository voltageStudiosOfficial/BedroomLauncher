name: Snapshot One-Swoop Builder

on:
  workflow_dispatch:
    inputs:
      suffix:
        description: "Snapshot suffix (a, b, instantcrash, microslop, etc.)"
        required: true
        default: "a"

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout full repo (needed for tagging)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up Java (Android build)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Generate snapshot tag
      - name: Generate snapshot version
        run: |
          WEEK=$(date +%U)
          YEAR_SHORT=$(date +%y)

          SUFFIX="${{ github.event.inputs.suffix }}"
          TAG="${YEAR_SHORT}w${WEEK}${SUFFIX}"

          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "Snapshot generated: $TAG"

      # 4. Create + push tag (this triggers nothing else, we stay in same job)
      - name: Create Git tag
        run: |
          git config user.name "snapshot-bot"
          git config user.email "snapshot@bot.local"

          git tag "$TAG"
          git push origin "$TAG"

      # 5. Build Android app using the same tag
      - name: Build Android release
        run: |
          ./gradlew assembleRelease \
          -PversionName=${TAG}

      # 6. Create GitHub Release
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Snapshot ${{ env.TAG }}
          files: app/build/outputs/apk/release/*.apk
